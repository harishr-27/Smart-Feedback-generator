<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Feedback Generator (Lite)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const API_URL = "http://localhost:8000";

        // --- COMPONENTS ---

        function SubmissionForm({ onSubmit, isLoading }) {
            const [studentId, setStudentId] = useState('student_123');
            const [file, setFile] = useState(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (file && studentId) {
                    onSubmit({ studentId, file });
                }
            };

            return (
                <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-xl mx-auto mt-10">
                    <h2 className="text-xl font-bold mb-4 text-slate-800">Submit Assignment</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">Student ID</label>
                            <input
                                type="text"
                                value={studentId}
                                onChange={(e) => setStudentId(e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                            />
                        </div>

                        <div className="border-2 border-dashed border-slate-300 rounded-lg p-8 text-center hover:bg-slate-50 transition-colors">
                            <input
                                type="file"
                                id="file-upload"
                                className="hidden"
                                onChange={(e) => setFile(e.target.files[0])}
                            />
                            <label htmlFor="file-upload" className="cursor-pointer flex flex-col items-center">
                                <i data-lucide="upload" className="w-8 h-8 text-slate-400 mb-2"></i>
                                <span className="text-sm text-slate-600 font-medium">
                                    {file ? file.name : "Click to upload submission (PDF/Docx)"}
                                </span>
                            </label>
                        </div>

                        <button
                            type="submit"
                            disabled={!file || isLoading}
                            className="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-medium"
                        >
                            {isLoading ? 'Analyzing...' : 'Generate Feedback'}
                        </button>
                    </form>
                </div>
            );
        }

        function FeedbackView({ feedback, onReset }) {
            if (!feedback) return null;

            return (
                <div className="max-w-4xl mx-auto space-y-6 mt-6 pb-20">
                    {/* Header */}
                    <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-slate-800">Feedback Result</h2>
                            <div className="bg-slate-100 px-4 py-2 rounded-full">
                                <span className="text-sm font-semibold text-slate-600">Score: </span>
                                <span className="text-2xl font-bold text-blue-600">{feedback.total_score}</span>
                                <span className="text-slate-500">/{feedback.max_score}</span>
                            </div>
                        </div>
                        <p className="text-slate-700 leading-relaxed">{feedback.general_summary}</p>
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Strengths/Weaknesses */}
                        <div className="space-y-6">
                            <div className="bg-green-50 p-6 rounded-lg border border-green-100">
                                <h3 className="flex items-center text-green-800 font-bold mb-3">
                                    <i data-lucide="check-circle" className="w-5 h-5 mr-2"></i> Strengths
                                </h3>
                                <ul className="list-disc list-inside space-y-1 text-green-800">
                                    {feedback.strengths.map((s, i) => <li key={i}>{s}</li>)}
                                </ul>
                            </div>

                            <div className="bg-amber-50 p-6 rounded-lg border border-amber-100">
                                <h3 className="flex items-center text-amber-800 font-bold mb-3">
                                    <i data-lucide="alert-circle" className="w-5 h-5 mr-2"></i> Areas for Improvement
                                </h3>
                                <ul className="list-disc list-inside space-y-1 text-amber-800">
                                    {feedback.weaknesses.map((w, i) => <li key={i}>{w}</li>)}
                                </ul>
                            </div>
                        </div>

                        {/* Detailed Criteria */}
                        <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                            <h3 className="text-lg font-bold mb-4 text-slate-800">Detailed Grading</h3>
                            <div className="space-y-4">
                                {feedback.criteria_feedback.map((criterion) => (
                                    <div key={criterion.criterion_id} className="border-b border-slate-100 pb-4 last:border-0 last:pb-0">
                                        <div className="flex justify-between mb-1">
                                            <span className="font-semibold text-slate-700">{criterion.name}</span>
                                            <span className="text-sm font-bold text-slate-500">{criterion.score}/{criterion.max_points}</span>
                                        </div>
                                        <div className="text-xs text-blue-600 mb-2 font-medium bg-blue-50 inline-block px-2 py-0.5 rounded">
                                            {criterion.level_achieved}
                                        </div>
                                        <p className="text-sm text-slate-600">{criterion.reasoning}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-center pt-8">
                        <button
                            onClick={onReset}
                            className="bg-slate-600 text-white py-2 px-6 rounded-full hover:bg-slate-700 transition-colors"
                        >
                            Grade Another Submission
                        </button>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---

        function App() {
            const [currentView, setCurrentView] = useState('submission');
            const [isLoading, setIsLoading] = useState(false);
            const [feedbackData, setFeedbackData] = useState(null);

            // Initialization for Lucide icons
            useEffect(() => {
                lucide.createIcons();
            }, [currentView]);

            const handleSubmission = async ({ studentId, file }) => {
                setIsLoading(true);

                // --- SETUP FOR PROTOTYPE ---
                // For this demo, we need to create a dummy Assignment and Rubric first 
                // because the "submit_and_grade" endpoint requires them.
                try {
                    // 1. Create Rubric
                    const rubricRes = await fetch(`${API_URL}/rubrics/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: "History Essay Rubric",
                            criteria: [
                                { name: "Thesis", max_points: 20, description: "Clarity of argument", levels: [] },
                                { name: "Evidence", max_points: 40, description: "Use of sources", levels: [] },
                                { name: "Mechanics", max_points: 40, description: "Grammar and style", levels: [] }
                            ]
                        })
                    });
                    const rubric = await rubricRes.json();

                    // 2. Create Assignment
                    const assignRes = await fetch(`${API_URL}/assignments/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: "The Great Depression",
                            rubric_id: rubric.id
                        })
                    });
                    const assignment = await assignRes.json();

                    // 3. Submit File
                    const formData = new FormData();
                    formData.append('file', file);

                    const submitRes = await fetch(`${API_URL}/submissions/${assignment.id}?student_id=${studentId}`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!submitRes.ok) throw new Error("Submission Failed");

                    const feedback = await submitRes.json();

                    setFeedbackData(feedback);
                    setCurrentView('feedback');

                } catch (err) {
                    console.error(err);
                    alert("Error processing submission. Check console for details.");
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* Navbar */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">AI</div>
                                <h1 className="font-bold text-slate-800 text-lg">Smart Grader <span className="text-slate-400 font-normal">| Lite Mode</span></h1>
                            </div>
                        </div>
                    </div>

                    {/* Content */}
                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {currentView === 'submission' && (
                            <div className="flex flex-col items-center justify-center min-h-[60vh]">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-2">Evaluate Assignments</h2>
                                    <p className="text-slate-500">Upload a student submission to generate instant AI-powered feedback.</p>
                                </div>
                                <div className="w-full">
                                    <SubmissionForm onSubmit={handleSubmission} isLoading={isLoading} />
                                </div>
                            </div>
                        )}

                        {currentView === 'feedback' && (
                            <FeedbackView
                                feedback={feedbackData}
                                onReset={() => {
                                    setFeedbackData(null);
                                    setCurrentView('submission');
                                }}
                            />
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
